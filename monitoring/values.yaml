grafana:
  adminPassword: "admin1234"
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - grafana.wafer.local
    paths:
      - /
  grafana.ini:
    "auth.anonymous":
      enabled: true
      org_role: Viewer
    security:
      allow_embedding: true

prometheus:
  prometheusSpec:
    retention: 7d
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

alertmanager:
  enabled: false
